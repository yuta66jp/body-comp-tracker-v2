name: ML Daily Batch

on:
  schedule:
    # 毎日 AM 3:00 JST (= UTC 18:00 前日)
    - cron: "0 18 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  predict:
    runs-on: ubuntu-latest
    # 環境変数を job-level に集約（各 step での重複定義を解消）
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r ml-pipeline/requirements.txt

      - name: Run enrich
        run: python ml-pipeline/enrich.py

      - name: Run predict
        run: python ml-pipeline/predict.py

      - name: Run analyze
        run: python ml-pipeline/analyze.py
