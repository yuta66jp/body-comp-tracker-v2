name: ML Daily Batch

on:
  schedule:
    # 毎日 AM 3:00 JST (= UTC 18:00 前日)
    - cron: "0 18 * * *"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: read
  issues: write # 失敗通知用 Issue 作成に必要

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 環境変数を job-level に集約（各 step での重複定義を解消）
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyTorch CPU
        run: python -m pip install --no-cache-dir torch==2.6.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: python -m pip install --no-cache-dir -r ml-pipeline/requirements-actions.txt

      - name: Run enrich
        run: python ml-pipeline/enrich.py

      - name: Run predict
        run: python ml-pipeline/predict.py

      - name: Notify failure via GitHub Issue
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ ML Daily Batch failed (Run #${context.runNumber})`,
              body: [
                '## ML Daily Batch が失敗しました',
                '',
                `- **Workflow**: ${context.workflow}`,
                `- **Job**: predict`,
                `- **Run**: [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                `- **Trigger**: ${context.eventName}`,
                '',
                '上記リンクからログを確認し、原因を調査してください。',
              ].join('\n'),
            });
