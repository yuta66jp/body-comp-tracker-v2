name: E2E Smoke Tests

# 主要ページ表示の読み取り専用 smoke tests を chromium で実行する。
# E2E_AUTH_EMAIL / E2E_AUTH_PASSWORD secrets がある場合は認証済み主要画面も必須実行する。
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ALLOWED_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL }}
        run: npm run build

      - name: Run smoke tests
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ALLOWED_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL }}
          E2E_REQUIRE_AUTH: ${{ (secrets.E2E_AUTH_EMAIL != '' && secrets.E2E_AUTH_PASSWORD != '') && 'true' || 'false' }}
          E2E_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL }}
          E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}
        run: npm run e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
